name: CI

# Build + run the proxy unit tests on every push and PR to master. The staleness gate for the
# proxy's pure logic (WeightCalculator, ProductDeduplicator, DimensionNormalizer): a behaviour
# change that doesn't update its test, or a red suite, fails here.
#
# No -warnaserror yet: the proxy still carries pre-existing warnings (CS8602/CS8604/CA2017).
# Add the gate once those are cleared (mirrors the Shredder repo's CI).

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    # Windows runner: the proxy targets net10.0-windows (FrameworkReference WindowsDesktop).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore and test
        run: dotnet test OutlookShredder.Proxy.Tests/OutlookShredder.Proxy.Tests.csproj --configuration Release
