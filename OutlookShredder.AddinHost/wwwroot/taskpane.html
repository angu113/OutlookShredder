<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shredder</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    :root {
      --bg:      #111827;
      --surface: #1f2937;
      --border:  #374151;
      --green:   #10b981;
      --red:     #ef4444;
      --amber:   #f59e0b;
      --text:    #f3f4f6;
      --dim:     #9ca3af;
      --mono:    'Consolas', 'Courier New', monospace;
      --sans:    'Segoe UI', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .header-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
    }
    .header-sub {
      font-size: 11px;
      color: var(--dim);
      margin-left: auto;
    }

    /* ── Status bar ── */
    .status-bar {
      padding: 9px 14px;
      display: flex;
      align-items: center;
      gap: 9px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--amber);
      flex-shrink: 0;
      transition: background 0.4s;
    }
    .dot.ok    { background: var(--green); }
    .dot.error { background: var(--red); }
    .dot.wait  { background: var(--amber); animation: blink 1.2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .status-label { font-size: 12px; }
    .proxy-label  {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      margin-left: auto;
    }

    /* ── Log section ── */
    .log-label {
      padding: 8px 14px 3px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      flex-shrink: 0;
    }
    .log {
      flex: 1;
      overflow-y: auto;
      padding: 4px 14px 10px;
    }
    .beat {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-family: var(--mono);
      font-size: 11px;
    }
    .beat:last-child { border-bottom: none; }
    .b-seq  { color: var(--dim); min-width: 32px; }
    .b-ok   { color: var(--green); }
    .b-err  { color: var(--red); }
    .b-rtt  { color: var(--dim); min-width: 44px; text-align: right; }
    .b-time { color: var(--dim); font-size: 10px; margin-left: 4px; }
    .b-msg  { color: var(--red); font-size: 11px; flex: 1;
              white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>

<div class="header">
  <span class="header-title">SHREDDER</span>
  <span class="header-sub">Outlook Add-in</span>
</div>

<div class="status-bar">
  <div class="dot wait" id="statusDot"></div>
  <span class="status-label" id="statusLabel">Connecting...</span>
  <span class="proxy-label" id="proxyLabel"></span>
</div>

<div class="log-label">Heartbeat Log</div>
<div class="log" id="log"></div>

<script type="module">
import { CONFIG }         from '/js/config.js';
import { startHeartbeat } from '/js/heartbeat.js';

const dot         = document.getElementById('statusDot');
const statusLabel = document.getElementById('statusLabel');
const logEl       = document.getElementById('log');

document.getElementById('proxyLabel').textContent = CONFIG.PROXY_URL;

const MAX = 25;

function onBeat(r) {
  dot.className        = 'dot ' + (r.ok ? 'ok' : 'error');
  statusLabel.textContent = r.ok ? 'Connected' : 'Disconnected';

  const entry = document.createElement('div');
  entry.className = 'beat';

  const now = new Date();
  const t = `${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())}:${pad(now.getUTCSeconds())} UTC`;

  if (r.ok) {
    const st = r.serverTime
      ? new Date(r.serverTime).toISOString().replace('T', ' ').slice(0, 19) + ' UTC'
      : t;
    entry.innerHTML =
      `<span class="b-seq">#${r.seq}</span>` +
      `<span class="b-ok">&#x2714;</span>` +
      `<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${st}</span>` +
      `<span class="b-rtt">${r.rtt}ms</span>`;
  } else {
    entry.innerHTML =
      `<span class="b-seq">#${r.seq}</span>` +
      `<span class="b-err">&#x2718;</span>` +
      `<span class="b-msg">${r.error || 'failed'}</span>` +
      `<span class="b-time">${t}</span>`;
  }

  logEl.prepend(entry);
  while (logEl.children.length > MAX) logEl.removeChild(logEl.lastChild);
}

function pad(n) { return String(n).padStart(2, '0'); }

startHeartbeat(onBeat);
</script>
</body>
</html>
